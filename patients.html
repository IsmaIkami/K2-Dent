<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patients - K2 Dent</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #0066FF;
            --success: #34C759;
            --danger: #FF3B30;
            --warning: #FF9500;
            --bg-main: #0A0E1A;
            --bg-card: #141B2D;
            --bg-hover: #1E2740;
            --text-primary: #FFFFFF;
            --text-secondary: #8B92A8;
            --border: #2A3347;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        
        h1 {
            font-size: 32px;
            font-weight: 800;
        }
        
        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 102, 255, 0.4);
        }
        
        .search-bar {
            background: var(--bg-card);
            padding: 16px 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 24px;
            display: flex;
            gap: 16px;
            align-items: center;
        }
        
        .search-bar input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
        }
        
        .patients-table {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        thead {
            background: var(--bg-hover);
        }
        
        th {
            padding: 16px 20px;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
            color: var(--text-secondary);
            text-transform: uppercase;
        }
        
        tbody tr {
            border-top: 1px solid var(--border);
            transition: background 0.2s;
        }
        
        tbody tr:hover {
            background: var(--bg-hover);
        }
        
        td {
            padding: 20px;
            font-size: 14px;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge-success {
            background: rgba(52, 199, 89, 0.15);
            color: var(--success);
        }
        
        .badge-warning {
            background: rgba(255, 149, 0, 0.15);
            color: var(--warning);
        }
        
        .actions {
            display: flex;
            gap: 8px;
        }
        
        .btn-icon {
            padding: 8px 12px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-icon:hover {
            background: var(--bg-hover);
            border-color: var(--primary);
            color: var(--primary);
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 32px;
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid var(--border);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .modal-title {
            font-size: 24px;
            font-weight: 700;
        }
        
        .close-btn {
            background: transparent;
            border: none;
            font-size: 24px;
            color: var(--text-secondary);
            cursor: pointer;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group.full-width {
            grid-column: 1 / -1;
        }
        
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        
        label span {
            color: var(--danger);
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .form-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }
        
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }
        
        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>👥 Gestion des Patients</h1>
                <p style="color: var(--text-secondary); margin-top: 8px;">
                    <span id="patientCount">0</span> patients enregistrés
                </p>
            </div>
            <button class="btn btn-primary" onclick="openModal()">
                <i class="fas fa-plus"></i> Nouveau Patient
            </button>
        </div>
        
        <div class="search-bar">
            <i class="fas fa-search" style="color: var(--text-secondary);"></i>
            <input type="text" id="searchInput" placeholder="Rechercher par nom, NISS, mutuelle..." onkeyup="filterPatients()">
        </div>
        
        <div class="patients-table">
            <table>
                <thead>
                    <tr>
                        <th>Patient</th>
                        <th>NISS</th>
                        <th>Âge</th>
                        <th>Mutuelle</th>
                        <th>Téléphone</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="patientsTableBody">
                    <tr class="empty-state">
                        <td colspan="6">
                            <i class="fas fa-users"></i>
                            <p>Aucun patient. Cliquez sur "Nouveau Patient" pour commencer.</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <!-- Modal -->
    <div class="modal" id="patientModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Nouveau Patient</h2>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            
            <form id="patientForm" onsubmit="savePatient(event)">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Prénom <span>*</span></label>
                        <input type="text" id="firstName" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Nom <span>*</span></label>
                        <input type="text" id="lastName" required>
                    </div>
                    
                    <div class="form-group">
                        <label>NISS <span>*</span></label>
                        <input type="text" id="niss" placeholder="XX.XX.XX-XXX.XX" required onblur="validateNISSField()">
                        <small id="nissError" style="color: var(--danger); font-size: 12px; display: none;"></small>
                    </div>
                    
                    <div class="form-group">
                        <label>Date de naissance <span>*</span></label>
                        <input type="date" id="dateOfBirth" required onchange="calculateAge()">
                    </div>
                    
                    <div class="form-group">
                        <label>Genre <span>*</span></label>
                        <select id="gender" required>
                            <option value="">Sélectionner...</option>
                            <option value="M">Masculin</option>
                            <option value="F">Féminin</option>
                            <option value="X">Autre</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Téléphone</label>
                        <input type="tel" id="phone" placeholder="+32 2 XXX XX XX">
                    </div>
                    
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email">
                    </div>
                    
                    <div class="form-group">
                        <label>Mutuelle <span>*</span></label>
                        <select id="mutuelle" required>
                            <option value="">Sélectionner...</option>
                            <option value="100">UNMS - Union Nationale Mutualités Socialistes</option>
                            <option value="200">Solidaris</option>
                            <option value="300">CM/MC - Mutualité Chrétienne</option>
                            <option value="400">Partenamut</option>
                            <option value="500">Mutlib - Mutualité Libérale</option>
                            <option value="600">CAAMI</option>
                            <option value="900">HR Rail</option>
                        </select>
                    </div>
                    
                    <div class="form-group full-width">
                        <label>
                            <input type="checkbox" id="bim" style="width: auto; margin-right: 8px;">
                            BIM (Bénéficiaire Intervention Majorée)
                        </label>
                    </div>
                    
                    <div class="form-group full-width">
                        <label>Allergies</label>
                        <input type="text" id="allergies" placeholder="Ex: Pénicilline, Latex">
                    </div>
                    
                    <div class="form-group full-width">
                        <label>Notes médicales</label>
                        <textarea id="medicalNotes" rows="3" placeholder="Antécédents, médications actuelles..."></textarea>
                    </div>
                </div>
                
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Annuler</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Enregistrer
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="js/belgium.js"></script>
    <script src="js/auth-rbac.js"></script>
    <script>
        // Require login
        Auth.requireLogin();
        
        let editingPatientId = null;
        
        // Load patients on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadPatients();
        });
        
        function loadPatients() {
            const patients = JSON.parse(localStorage.getItem('k2dent_patients') || '[]');
            displayPatients(patients);
            document.getElementById('patientCount').textContent = patients.length;
        }
        
        function displayPatients(patients) {
            const tbody = document.getElementById('patientsTableBody');
            
            if (patients.length === 0) {
                tbody.innerHTML = `
                    <tr class="empty-state">
                        <td colspan="6">
                            <i class="fas fa-users"></i>
                            <p>Aucun patient trouvé.</p>
                        </td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = patients.map(patient => {
                const mutuelle = BelgiumUtils.getMutuelleByCode(patient.mutuelleCode);
                const age = BelgiumUtils.calculateAge(patient.dateOfBirth);
                
                return `
                    <tr>
                        <td>
                            <strong>${patient.firstName} ${patient.lastName}</strong>
                            ${patient.bim ? '<span class="badge badge-warning">BIM</span>' : ''}
                        </td>
                        <td>${patient.niss}</td>
                        <td>${age} ans</td>
                        <td>${mutuelle ? mutuelle.short : patient.mutuelleCode}</td>
                        <td>${patient.phone || '-'}</td>
                        <td>
                            <div class="actions">
                                <button class="btn-icon" onclick="editPatient('${patient.id}')" title="Modifier">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="btn-icon" onclick="viewPatient('${patient.id}')" title="Voir dossier">
                                    <i class="fas fa-folder-open"></i>
                                </button>
                                <button class="btn-icon" onclick="deletePatient('${patient.id}')" title="Supprimer">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }
        
        function filterPatients() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const patients = JSON.parse(localStorage.getItem('k2dent_patients') || '[]');
            
            const filtered = patients.filter(p => 
                p.firstName.toLowerCase().includes(searchTerm) ||
                p.lastName.toLowerCase().includes(searchTerm) ||
                p.niss.includes(searchTerm) ||
                (p.phone && p.phone.includes(searchTerm))
            );
            
            displayPatients(filtered);
        }
        
        function openModal(patientId = null) {
            const modal = document.getElementById('patientModal');
            const form = document.getElementById('patientForm');
            
            editingPatientId = patientId;
            
            if (patientId) {
                // Edit mode
                document.getElementById('modalTitle').textContent = 'Modifier le Patient';
                const patients = JSON.parse(localStorage.getItem('k2dent_patients') || '[]');
                const patient = patients.find(p => p.id === patientId);
                
                if (patient) {
                    document.getElementById('firstName').value = patient.firstName;
                    document.getElementById('lastName').value = patient.lastName;
                    document.getElementById('niss').value = patient.niss;
                    document.getElementById('dateOfBirth').value = patient.dateOfBirth;
                    document.getElementById('gender').value = patient.gender;
                    document.getElementById('phone').value = patient.phone || '';
                    document.getElementById('email').value = patient.email || '';
                    document.getElementById('mutuelle').value = patient.mutuelleCode;
                    document.getElementById('bim').checked = patient.bim || false;
                    document.getElementById('allergies').value = patient.allergies || '';
                    document.getElementById('medicalNotes').value = patient.medicalNotes || '';
                }
            } else {
                // Create mode
                document.getElementById('modalTitle').textContent = 'Nouveau Patient';
                form.reset();
            }
            
            modal.classList.add('active');
        }
        
        function closeModal() {
            const modal = document.getElementById('patientModal');
            modal.classList.remove('active');
            editingPatientId = null;
        }
        
        function validateNISSField() {
            const niss = document.getElementById('niss').value;
            const errorEl = document.getElementById('nissError');
            
            if (!niss) return;
            
            if (!BelgiumUtils.validateNISS(niss)) {
                errorEl.textContent = '⚠️ NISS invalide. Format: XX.XX.XX-XXX.XX';
                errorEl.style.display = 'block';
                return false;
            } else {
                errorEl.style.display = 'none';
                // Auto-format
                document.getElementById('niss').value = BelgiumUtils.formatNISS(niss);
                return true;
            }
        }
        
        function calculateAge() {
            const dob = document.getElementById('dateOfBirth').value;
            if (dob) {
                const age = BelgiumUtils.calculateAge(dob);
                console.log('Âge calculé:', age, 'ans');
            }
        }
        
        function savePatient(event) {
            event.preventDefault();
            
            // Validate NISS
            if (!validateNISSField()) {
                alert('⚠️ Veuillez corriger le NISS avant de continuer.');
                return;
            }
            
            const patients = JSON.parse(localStorage.getItem('k2dent_patients') || '[]');
            
            const patient = {
                id: editingPatientId || `patient-${Date.now()}`,
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                niss: document.getElementById('niss').value,
                dateOfBirth: document.getElementById('dateOfBirth').value,
                gender: document.getElementById('gender').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                mutuelleCode: document.getElementById('mutuelle').value,
                bim: document.getElementById('bim').checked,
                allergies: document.getElementById('allergies').value,
                medicalNotes: document.getElementById('medicalNotes').value,
                createdAt: editingPatientId ? patients.find(p => p.id === editingPatientId).createdAt : new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
            
            if (editingPatientId) {
                // Update
                const index = patients.findIndex(p => p.id === editingPatientId);
                patients[index] = patient;
            } else {
                // Create
                patients.push(patient);
            }
            
            localStorage.setItem('k2dent_patients', JSON.stringify(patients));
            
            closeModal();
            loadPatients();
            
            alert(`✅ Patient ${patient.firstName} ${patient.lastName} enregistré avec succès!`);
        }
        
        function editPatient(patientId) {
            if (!Auth.hasPermission('patients.edit')) {
                alert('⛔ Vous n\'avez pas la permission de modifier les patients.');
                return;
            }
            openModal(patientId);
        }
        
        function viewPatient(patientId) {
            // Redirect to patient dashboard
            window.location.href = `dashboard.html?patient=${patientId}`;
        }
        
        function deletePatient(patientId) {
            if (!Auth.hasPermission('patients.delete')) {
                alert('⛔ Vous n\'avez pas la permission de supprimer les patients.');
                return;
            }
            
            const patients = JSON.parse(localStorage.getItem('k2dent_patients') || '[]');
            const patient = patients.find(p => p.id === patientId);
            
            if (confirm(`⚠️ Supprimer ${patient.firstName} ${patient.lastName}?\n\nCette action est irréversible.`)) {
                const filtered = patients.filter(p => p.id !== patientId);
                localStorage.setItem('k2dent_patients', JSON.stringify(filtered));
                loadPatients();
                alert('✅ Patient supprimé.');
            }
        }
        
        // Close modal on Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
