<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prescriptions - K2 Dent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0A0E1A 0%, #1E2740 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #0052A3, #0066CC);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 24px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .header-subtitle {
            font-size: 14px;
            opacity: 0.9;
        }

        .header-badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 16px 24px;
            border-radius: 12px;
            text-align: center;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 24px;
        }

        .card {
            background: #141B2D;
            border-radius: 20px;
            border: 1px solid #2A3347;
            padding: 24px;
        }

        .card-title {
            font-size: 20px;
            font-weight: 700;
            color: #FFFFFF;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #FFFFFF;
            margin-bottom: 8px;
        }

        select, input, textarea {
            width: 100%;
            padding: 12px 16px;
            background: #0A0E1A;
            border: 1px solid #2A3347;
            border-radius: 10px;
            color: #FFFFFF;
            font-size: 14px;
            transition: all 0.2s;
        }

        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: #0066FF;
            box-shadow: 0 0 0 3px rgba(0, 102, 255, 0.1);
        }

        .med-search {
            position: relative;
        }

        .med-results {
            background: #0A0E1A;
            border: 1px solid #2A3347;
            border-radius: 10px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 8px;
            display: none;
        }

        .med-results.show {
            display: block;
        }

        .med-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid #2A3347;
            transition: all 0.2s;
        }

        .med-item:hover {
            background: #1E2740;
        }

        .selected-meds {
            margin-top: 20px;
        }

        .selected-med {
            background: #0A0E1A;
            border: 1px solid #2A3347;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .med-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .med-name {
            font-weight: 700;
            color: #0066FF;
        }

        .remove-btn {
            background: #FF3B30;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn {
            padding: 14px 28px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0066FF, #0052CC);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 102, 255, 0.4);
        }

        .btn-secondary {
            background: #1E2740;
            color: #FFFFFF;
            border: 1px solid #2A3347;
        }

        .prescription-list {
            margin-top: 16px;
        }

        .prescription-item {
            background: #0A0E1A;
            border: 1px solid #2A3347;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
        }

        .prescription-item:hover {
            background: #1E2740;
            border-color: #0066FF;
        }

        .prescription-date {
            font-weight: 600;
            color: #0066FF;
            margin-bottom: 8px;
        }

        .prescription-patient {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .prescription-meds {
            font-size: 13px;
            color: #8B92A8;
        }

        .recipe-id {
            font-family: monospace;
            font-size: 12px;
            color: #8B92A8;
            margin-top: 8px;
        }

        .warning {
            background: rgba(255, 149, 0, 0.1);
            border: 1px solid #FF9500;
            border-radius: 10px;
            padding: 12px;
            margin: 16px 0;
            color: #FF9500;
            font-size: 13px;
        }

        .info-box {
            background: rgba(0, 102, 255, 0.1);
            border: 1px solid rgba(0, 102, 255, 0.3);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #8B92A8;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8B92A8;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #8B92A8;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 20px;
            transition: all 0.2s;
        }

        .back-btn:hover {
            color: #FFFFFF;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="dashboard.html" class="back-btn">← Retour au Dashboard</a>

        <div class="header">
            <div>
                <h1>💊 Prescriptions Recip-e</h1>
                <div class="header-subtitle">🇧🇪 Plateforme e-Health Belgique | Prescriptions électroniques</div>
            </div>
            <div class="header-badge">
                <div style="font-size: 12px; text-transform: uppercase; opacity: 0.9; margin-bottom: 4px;">e-Health</div>
                <div style="font-size: 18px; font-weight: 700;">✓ Connecté</div>
            </div>
        </div>

        <div class="content-grid">
            <!-- Form -->
            <div class="card">
                <div class="card-title">📝 Nouvelle Prescription</div>

                <div class="info-box">
                    ℹ️ Sélectionnez un patient et ajoutez des médicaments. Le système vérifie automatiquement les allergies et interactions.
                </div>

                <form id="prescriptionForm" onsubmit="savePrescription(event)">
                    <div class="form-group">
                        <label for="patientSelect">Patient *</label>
                        <select id="patientSelect" required onchange="updatePatientInfo()">
                            <option value="">-- Sélectionner un patient --</option>
                        </select>
                        <div id="patientInfo" style="margin-top: 8px; font-size: 13px; color: #8B92A8;"></div>
                        <div id="allergyWarning"></div>
                    </div>

                    <div class="form-group">
                        <label for="medSearch">Médicament</label>
                        <div class="med-search">
                            <input
                                type="text"
                                id="medSearch"
                                placeholder="Rechercher un médicament (ex: Ibuprofen, Amoxicilline...)"
                                oninput="searchMeds()"
                                onfocus="searchMeds()"
                            >
                            <div id="medResults" class="med-results"></div>
                        </div>
                    </div>

                    <div id="selectedMeds" class="selected-meds"></div>

                    <div id="interactionWarnings"></div>

                    <div class="form-group">
                        <label for="notes">Notes (optionnel)</label>
                        <textarea id="notes" placeholder="Instructions spéciales..."></textarea>
                    </div>

                    <div style="display: flex; gap: 12px; margin-top: 24px;">
                        <button type="submit" class="btn btn-primary">✅ Générer Recip-e</button>
                        <button type="button" class="btn btn-secondary" onclick="resetForm()">🔄 Réinitialiser</button>
                    </div>
                </form>
            </div>

            <!-- History -->
            <div class="card">
                <div class="card-title">📋 Prescriptions récentes</div>
                <div id="prescriptionsList"></div>
            </div>
        </div>
    </div>

    <script src="js/belgium.js"></script>
    <script src="js/auth-rbac.js"></script>
    <script>
        let selectedMedications = [];
        let prescriptionCounter = Date.now();

        // Check auth
        if (!Auth.isLoggedIn()) {
            window.location.href = 'login.html';
        }

        const currentUser = Auth.getCurrentUser();
        if (!Auth.hasPermission('prescriptions.view')) {
            alert('❌ Accès refusé');
            window.location.href = 'dashboard.html';
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadPatients();
            loadPrescriptions();
        });

        // Load patients
        function loadPatients() {
            const patients = JSON.parse(localStorage.getItem('k2dent_patients') || '[]');
            const select = document.getElementById('patientSelect');

            patients.forEach(patient => {
                const option = document.createElement('option');
                option.value = patient.id;
                option.textContent = `${patient.firstName} ${patient.lastName} - ${patient.niss}`;
                option.dataset.patient = JSON.stringify(patient);
                select.appendChild(option);
            });
        }

        // Update patient info
        function updatePatientInfo() {
            const select = document.getElementById('patientSelect');
            const infoDiv = document.getElementById('patientInfo');
            const warningDiv = document.getElementById('allergyWarning');

            if (!select.value) {
                infoDiv.innerHTML = '';
                warningDiv.innerHTML = '';
                return;
            }

            const patient = JSON.parse(select.options[select.selectedIndex].dataset.patient);
            infoDiv.innerHTML = `NISS: ${patient.niss} | ${patient.age || 'N/A'} ans`;

            if (patient.allergies) {
                warningDiv.innerHTML = `<div class="warning">⚠️ Allergies: ${patient.allergies}</div>`;
            } else {
                warningDiv.innerHTML = '';
            }

            checkInteractions();
        }

        // Search medications
        function searchMeds() {
            const query = document.getElementById('medSearch').value.toLowerCase();
            const resultsDiv = document.getElementById('medResults');

            if (query.length < 2) {
                resultsDiv.classList.remove('show');
                return;
            }

            const meds = BelgiumUtils.MEDICATIONS_BELGIUM.filter(med =>
                med.name.toLowerCase().includes(query) ||
                med.activeIngredient.toLowerCase().includes(query)
            ).slice(0, 10);

            if (meds.length === 0) {
                resultsDiv.innerHTML = '<div class="med-item">Aucun médicament trouvé</div>';
                resultsDiv.classList.add('show');
                return;
            }

            resultsDiv.innerHTML = meds.map(med => `
                <div class="med-item" onclick='selectMed(${JSON.stringify(med)})'>
                    <div style="font-weight: 600;">${med.name}</div>
                    <div style="font-size: 12px; color: #8B92A8;">CNK: ${med.cnk} | ${med.activeIngredient}</div>
                </div>
            `).join('');

            resultsDiv.classList.add('show');
        }

        // Select medication
        function selectMed(med) {
            if (selectedMedications.find(m => m.cnk === med.cnk)) {
                alert('⚠️ Ce médicament est déjà dans la prescription');
                return;
            }

            selectedMedications.push(med);
            renderSelectedMeds();
            checkInteractions();

            document.getElementById('medSearch').value = '';
            document.getElementById('medResults').classList.remove('show');
        }

        // Render selected medications
        function renderSelectedMeds() {
            const container = document.getElementById('selectedMeds');

            if (selectedMedications.length === 0) {
                container.innerHTML = '';
                return;
            }

            container.innerHTML = selectedMedications.map((med, idx) => `
                <div class="selected-med">
                    <div class="med-header">
                        <div class="med-name">${med.name}</div>
                        <button class="remove-btn" type="button" onclick="removeMed(${idx})">✕</button>
                    </div>
                    <div style="font-size: 13px; color: #8B92A8;">
                        CNK: ${med.cnk} | ${med.activeIngredient}
                    </div>
                    <div style="margin-top: 12px;">
                        <input type="text" placeholder="Posologie (ex: 3x/jour pendant 7 jours)" style="width: 100%; padding: 8px; background: #141B2D; border: 1px solid #2A3347; border-radius: 8px; color: #FFFFFF; font-size: 13px;">
                    </div>
                </div>
            `).join('');
        }

        // Remove medication
        function removeMed(idx) {
            selectedMedications.splice(idx, 1);
            renderSelectedMeds();
            checkInteractions();
        }

        // Check interactions
        function checkInteractions() {
            const warningsDiv = document.getElementById('interactionWarnings');
            const select = document.getElementById('patientSelect');

            if (!select.value || selectedMedications.length === 0) {
                warningsDiv.innerHTML = '';
                return;
            }

            const patient = JSON.parse(select.options[select.selectedIndex].dataset.patient);
            const warnings = [];

            // Check allergies
            if (patient.allergies) {
                const allergies = patient.allergies.toLowerCase();
                selectedMedications.forEach(med => {
                    if (allergies.includes('pénicilline') &&
                        (med.name.toLowerCase().includes('amoxicillin') ||
                         med.name.toLowerCase().includes('pénicilline'))) {
                        warnings.push(`🚨 DANGER: ${med.name} - Patient allergique à la pénicilline!`);
                    }
                });
            }

            if (warnings.length > 0) {
                warningsDiv.innerHTML = warnings.map(w => `<div class="warning">${w}</div>`).join('');
            } else {
                warningsDiv.innerHTML = '';
            }
        }

        // Save prescription
        function savePrescription(event) {
            event.preventDefault();

            if (!Auth.hasPermission('prescriptions.create')) {
                alert('❌ Permission refusée');
                return;
            }

            if (selectedMedications.length === 0) {
                alert('⚠️ Veuillez ajouter au moins un médicament');
                return;
            }

            // Check for dangerous interactions
            const warningsDiv = document.getElementById('interactionWarnings');
            if (warningsDiv.innerHTML.includes('🚨 DANGER')) {
                if (!confirm('🚨 ATTENTION: Allergie détectée!\n\nVoulez-vous vraiment continuer?')) {
                    return;
                }
            }

            const select = document.getElementById('patientSelect');
            const patient = JSON.parse(select.options[select.selectedIndex].dataset.patient);

            const prescription = {
                id: `rx-${Date.now()}`,
                recipeId: `BE-2026-${prescriptionCounter++}-RXDE`,
                patientId: patient.id,
                patientName: `${patient.firstName} ${patient.lastName}`,
                patientNISS: patient.niss,
                medications: selectedMedications.map((med, idx) => ({
                    ...med,
                    dosage: document.querySelectorAll('.selected-med input')[idx].value
                })),
                notes: document.getElementById('notes').value,
                date: new Date().toISOString(),
                createdBy: currentUser.username,
                status: 'active'
            };

            const prescriptions = JSON.parse(localStorage.getItem('k2dent_prescriptions') || '[]');
            prescriptions.unshift(prescription);
            localStorage.setItem('k2dent_prescriptions', JSON.stringify(prescriptions));

            alert(`✅ Prescription Recip-e générée!\n\nID: ${prescription.recipeId}`);

            resetForm();
            loadPrescriptions();
        }

        // Load prescriptions
        function loadPrescriptions() {
            const prescriptions = JSON.parse(localStorage.getItem('k2dent_prescriptions') || '[]');
            const listDiv = document.getElementById('prescriptionsList');

            if (prescriptions.length === 0) {
                listDiv.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">💊</div>
                        <div>Aucune prescription enregistrée</div>
                    </div>
                `;
                return;
            }

            const recent = prescriptions.slice(0, 10);

            listDiv.innerHTML = recent.map(rx => `
                <div class="prescription-item">
                    <div class="prescription-date">${formatDate(rx.date)}</div>
                    <div class="prescription-patient">${rx.patientName}</div>
                    <div class="prescription-meds">
                        ${rx.medications.map(m => `• ${m.name} ${m.dosage ? '- ' + m.dosage : ''}`).join('<br>')}
                    </div>
                    <div class="recipe-id">Recip-e ID: ${rx.recipeId}</div>
                </div>
            `).join('');
        }

        // Format date
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('fr-BE', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        // Reset form
        function resetForm() {
            selectedMedications = [];
            renderSelectedMeds();
            document.getElementById('prescriptionForm').reset();
            document.getElementById('patientInfo').innerHTML = '';
            document.getElementById('allergyWarning').innerHTML = '';
            document.getElementById('interactionWarnings').innerHTML = '';
        }

        // Close search results when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.med-search')) {
                document.getElementById('medResults').classList.remove('show');
            }
        });
    </script>
</body>
</html>
